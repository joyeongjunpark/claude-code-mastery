<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        /* 전체 레이아웃 */
        :root {
            color-scheme: light dark;
            --bg: #0f172a;
            --bg-elevated: #020617;
            --accent: #22c55e;
            --accent-soft: rgba(34, 197, 94, 0.12);
            --border-subtle: rgba(148, 163, 184, 0.4);
            --text-main: #e5e7eb;
            --text-soft: #9ca3af;
            --danger: #f97373;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #1d283a, #020617);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
        }

        .app {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px 28px;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.06), rgba(15,23,42,0.98));
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow:
                0 18px 60px rgba(15,23,42,0.9),
                0 0 0 1px rgba(15,23,42,1);
            backdrop-filter: blur(20px);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 8px;
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .title-main {
            font-size: 22px;
            font-weight: 650;
            letter-spacing: 0.03em;
        }

        .title-sub {
            font-size: 12px;
            color: var(--text-soft);
        }

        .counter-badge {
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 11px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: radial-gradient(circle at top left, rgba(148,163,184,0.35), rgba(15,23,42,0.9));
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 98px;
        }

        .counter-badge strong {
            font-size: 13px;
            font-weight: 600;
        }

        .counter-badge span {
            font-size: 11px;
            color: var(--text-soft);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .input-row input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background-color: rgba(15,23,42,0.85);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .input-row input::placeholder {
            color: rgba(148, 163, 184, 0.8);
        }

        .input-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(34,197,94,0.6);
            background-color: rgba(15,23,42,0.95);
        }

        .input-row button {
            padding: 0 16px;
            border-radius: 999px;
            border: none;
            background: radial-gradient(circle at top left, #4ade80, #22c55e);
            color: #022c22;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 10px 25px rgba(34,197,94,0.45);
            transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
        }

        .input-row button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 12px 28px rgba(34,197,94,0.55);
        }

        .input-row button:active {
            transform: translateY(0);
            box-shadow: 0 6px 16px rgba(34,197,94,0.4);
        }

        .input-row button span.icon {
            font-size: 14px;
        }

        .input-extra-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .input-field-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-field-label {
            font-size: 11px;
            color: var(--text-soft);
        }

        .input-field-control {
            width: 100%;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background-color: rgba(15,23,42,0.85);
            color: var(--text-main);
            font-size: 12px;
            outline: none;
        }

        .input-field-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(34,197,94,0.6);
            background-color: rgba(15,23,42,0.95);
        }

        .input-memo-row {
            margin-bottom: 14px;
        }

        .input-memo-row input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background-color: rgba(15,23,42,0.85);
            color: var(--text-main);
            font-size: 13px;
            outline: none;
        }

        .input-memo-row input::placeholder {
            color: rgba(148, 163, 184, 0.8);
        }

        .input-memo-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(34,197,94,0.6);
            background-color: rgba(15,23,42,0.95);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .filter-group {
            display: inline-flex;
            padding: 3px;
            background-color: rgba(15,23,42,0.96);
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: 0 10px 25px rgba(15,23,42,0.9);
        }

        .filter-button {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            border: none;
            background: transparent;
            color: var(--text-soft);
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .filter-button.active {
            background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.3), rgba(22, 163, 74, 0.9));
            color: #022c22;
            font-weight: 600;
        }

        .clear-button {
            background: none;
            border: none;
            color: rgba(148, 163, 184, 0.9);
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
        }

        .clear-button:hover {
            color: var(--danger);
        }

        .list {
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
            margin: 0;
            list-style: none;
        }

        .list::-webkit-scrollbar {
            width: 6px;
        }

        .list::-webkit-scrollbar-thumb {
            background-color: rgba(148, 163, 184, 0.6);
            border-radius: 999px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 10px;
            margin-bottom: 6px;
            border-radius: 12px;
            border: 1px solid rgba(30, 64, 175, 0.6);
            background: radial-gradient(circle at top left, rgba(30,64,175,0.6), rgba(15,23,42,0.98));
            box-shadow: 0 8px 18px rgba(15,23,42,0.9);
            transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
        }

        .todo-item.completed {
            opacity: 0.7;
            border-color: rgba(22, 163, 74, 0.7);
            background: radial-gradient(circle at top left, rgba(34,197,94,0.35), rgba(15,23,42,0.98));
        }

        .todo-main {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            border: 1px solid rgba(148, 163, 184, 0.8);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(15,23,42,0.98);
            cursor: pointer;
            font-size: 12px;
            color: var(--accent);
            transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
            flex-shrink: 0;
        }

        .todo-checkbox.completed {
            background-color: rgba(22, 163, 74, 0.1);
            border-color: rgba(34, 197, 94, 0.9);
        }

        .todo-title {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-title.completed {
            text-decoration: line-through;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
            color: rgba(148, 163, 184, 0.95);
        }

        .todo-meta {
            font-size: 11px;
            color: rgba(148, 163, 184, 0.9);
        }

        .todo-memo {
            font-size: 12px;
            color: var(--text-soft);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-item.priority-high {
            border-color: rgba(248, 113, 113, 0.9);
        }

        .todo-item.priority-low {
            border-color: rgba(59, 130, 246, 0.85);
        }

        .todo-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-button {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            cursor: pointer;
            background-color: rgba(15,23,42,0.98);
            color: rgba(148, 163, 184, 0.9);
            transition: background 0.12s ease, color 0.12s ease, transform 0.08s ease;
        }

        .icon-button:hover {
            background-color: rgba(248, 113, 113, 0.25);
            color: #fecaca;
            transform: translateY(-0.5px);
        }

        .empty-state {
            margin-top: 34px;
            text-align: center;
            font-size: 13px;
            color: var(--text-soft);
        }

        .empty-state strong {
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .empty-state span {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="title">
                <div class="title-main">Today&apos;s Focus</div>
                <div class="title-sub">오늘 해야 할 일들을 정리해 보세요.</div>
            </div>
            <div class="counter-badge" id="todo-counter">
                <strong>0개 남음</strong>
                <span>완료 0 / 전체 0</span>
            </div>
        </header>

        <section class="input-row">
            <input
                id="todo-input"
                type="text"
                placeholder="할 일을 입력하고 Enter 또는 추가 버튼을 눌러주세요."
                autocomplete="off"
            />
            <button id="add-button" type="button">
                <span class="icon">＋</span>
                <span>추가</span>
            </button>
        </section>

        <section class="input-extra-row">
            <div class="input-field-group">
                <label class="input-field-label" for="todo-deadline">마감일 (선택)</label>
                <input
                    id="todo-deadline"
                    type="date"
                    class="input-field-control"
                />
            </div>
            <div class="input-field-group">
                <label class="input-field-label" for="todo-priority">우선순위</label>
                <select
                    id="todo-priority"
                    class="input-field-control"
                >
                    <option value="normal">보통</option>
                    <option value="high">높음</option>
                    <option value="low">낮음</option>
                </select>
            </div>
        </section>

        <section class="input-memo-row">
            <input
                id="todo-memo"
                type="text"
                placeholder="필요하다면 메모를 남겨주세요. (선택 사항)"
                autocomplete="off"
            />
        </section>

        <section class="toolbar">
            <div class="filter-group" id="filter-group">
                <button class="filter-button active" data-filter="all">전체</button>
                <button class="filter-button" data-filter="active">진행중</button>
                <button class="filter-button" data-filter="completed">완료</button>
            </div>
            <button class="clear-button" id="clear-completed-button">
                완료 항목 지우기
            </button>
        </section>

        <ul class="list" id="todo-list"></ul>

        <div class="empty-state" id="empty-state" hidden>
            <strong>아직 등록된 할 일이 없습니다.</strong>
            <span>위 입력창에 오늘의 할 일을 적어보세요.</span>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
